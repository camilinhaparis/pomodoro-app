<!doctype html>
<html lang="en" data-contexto="foco">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusFlow</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="icon" href="favicon.ico" type="xml/svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="js/script.js" defer></script>
    <script src="js/script-crud.js" defer></script>
  </head>
  <body>
    <main>
      <header class="app__header">
        <figure class="app__logo-figure">
          <img
            src="./assets/images/logo.png"
            alt="logo"
            class="app__logo-image"
          />
        </figure>
      </header>
      <section class="app__section-banner-container">
        <h1 class="app__title">
          Optimize your productivity,<br />
          <strong class="app__title-strong">focus on what matters.</strong>
        </h1>
        <figure class="app__image-figure">
          <img
            src="./assets/images/foco.png"
            alt="Cyborg-style man image"
            class="app__image"
          />
        </figure>
      </section>
      <section class="app__section-card-container">
        <div class="app__card">
          <ul class="app__card-list">
            <li class="app__card-list-item">
              <button
                data-contexto="foco"
                class="app__card-button app__card-button--foco active"
              >
                Focus
              </button>
            </li>
            <li class="app__card-list-item">
              <button
                data-contexto="short"
                class="app__card-button app__card-button--curto"
              >
                Short break
              </button>
            </li>
            <li class="app__card-list-item">
              <button
                data-contexto="long"
                class="app__card-button app__card-button--longo"
              >
                Long break
              </button>
            </li>
          </ul>
          <div id="timer" class="app__card-timer"></div>
          <ul class="app__card-list">
            <li class="app__card-list-item">
              <label class="toggle">
                <input
                  class="toggle-checkbox"
                  type="checkbox"
                  id="alternar-musica"
                />
                <div class="toggle-switch"></div>
              </label>
            </li>
            <li class="app__card-list-item">
              <label class="app__card-list-label" for="alternar-musica">
                Music
              </label>
            </li>
          </ul>
          <div class="app__card-primary-button-wrapper">
            <button id="start-pause" class="app__card-primary-button">
              <img
                class="app__card-primary-butto-icon"
                src="./assets/images/play_arrow.png"
                alt=""
              />
              <span>Start</span>
            </button>
          </div>
        </div>
      </section>

      <section class="app__section-task-container">
        <div class="app__section-task-content">
          <header class="app__section-active-task">
            <p class="app__section-active-task-label">#Em andamento:</p>
            <p class="app__section-active-task-description"></p>
          </header>
          <div class="app__section-task-header">
            <h2 class="app__section-tasks-heading">Lista de tarefas:</h2>
            <div class="dropdown-container">
              <button class="app_button-more">
                <img src="./assets/images/more.svg" alt="" />
              </button>
              <ul class="app__section-task-header__ul">
                <li class="app__section-task-header__li">
                  <button
                    class="app__section-task-header__li__button"
                    id="btn-remover-concluidas"
                  >
                    <img src="./assets/images/check.svg" alt="" />
                    Limpar tarefas concluídas
                  </button>
                </li>
                <li class="app__section-task-header__li">
                  <button
                    class="app__section-task-header__li__button"
                    id="btn-remover-todas"
                  >
                    <img src="./assets/images/trash.svg" alt="" />
                    Limpar todas as tarefas
                  </button>
                </li>
              </ul>
            </div>
          </div>
          <ul class="app__section-task-list"></ul>
          <form class="app__form-add-task hidden" aria-hidden="true">
            <div class="app__form-field">
              <label class="app__form-label"> Adicionando tarefa </label>
              <textarea
                required
                rows="4"
                class="app__form-textarea"
                placeholder="No que você está trabalhando?"
              ></textarea>
            </div>
            <footer class="app__form-footer">
              <button
                type="button"
                class="app__form-footer__button app__form-footer__button--delete"
              >
                <img src="./assets/images/delete.png" alt="" /> Deletar
              </button>
              <div class="splitter"></div>
              <button
                type="button"
                class="app__form-footer__button app__form-footer__button--cancel"
              >
                <img src="./assets/images/close.png" alt="" /> Cancelar
              </button>
              <button
                class="app__form-footer__button app__form-footer__button--confirm"
              >
                <img src="./assets/images/save.png" alt="" /> Salvar
              </button>
            </footer>
          </form>
          <button class="app__button--add-task">
            <img src="./assets/images/add_circle.png" alt="" /> Adicionar nova
            tarefa
          </button>
        </div>
      </section>

      <footer class="app__footer">
        <p class="app__footer-text">
          Fictional project with no commercial purposes. Images generated by AI.
        </p>
      </footer>
    </main>
  </body>
</html>
